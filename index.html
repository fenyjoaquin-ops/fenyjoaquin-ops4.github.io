<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenReserva</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- cabezera -->
    <header class="header">
        <div class="header-top">
            <div>USD | EUR</div>
            <div>Español</div>
        </div>
        <div class="header-main">
            <img class="logo" src="fotos/logo-venr.png" alt="logo-Vanreserva">
            <nav class="nav">
                <a href="https://www.banreservas.com/personal/">Personas</a>
                <a href="#">Empresas</a>
                <a href="#">Productos</a>
                <a href="#">Contactos</a>
                <a href="#">TuBanco</a>
            </nav>
        </div>
    </header>
	
	

    <!-- parte delhero-->
    <section class="hero">
        <h2>Bienvenido a VenReserva</h2>
        <p>El banco de todos los dominicanos</p>
        <button>Explorar productos</button>
    </section>

    <!-- los Productos / Promociones -->
    <section class="cards">
        <div class="card">
            <h3>Cuentas</h3>
            <p>Ahorros, Corrientes y más</p>
        </div>
        <div class="card">
            <h3>Tarjetas</h3>
            <p>Débito y Crédito</p>
        </div>
        <div class="card">
            <h3>Préstamos</h3>
            <p>Personales y vehículos</p>
        </div>
    </section>

    <!-- pie de pagina -->
    <footer class="footer">
        <p>© 2026 BanReservas algo educativo en programacion 3</p>
    </footer>

</body>
</html>
